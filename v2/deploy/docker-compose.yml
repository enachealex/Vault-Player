# Watch Party rendezvous.
#
# Copy this file and the repo to the server, then from the v2/ directory:
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# Check it:  curl http://localhost:5555/health     -> ok
# Logs:      docker compose -f deploy/docker-compose.yml logs -f
# Update:    git pull && docker compose -f deploy/docker-compose.yml up -d --build

services:
  rendezvous:
    build:
      context: ..
      dockerfile: src/Rendezvous/Dockerfile
    container_name: vault-rendezvous
    restart: unless-stopped
    ports:
      # Host port must stay 5555: the app builds ws://<address>:5555 directly.
      - "5555:5555"
    environment:
      - PORT=5555
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5555/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # The relay holds no accounts and stores no media -- it only forwards
    # bytes between the host and guests -- so it needs no volumes.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

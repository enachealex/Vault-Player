# Watch Party rendezvous.
#
# Copy this file and the repo to the server, then from the v2/ directory:
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# Check it:  curl http://localhost:5555/health     -> ok
# Logs:      docker compose -f deploy/docker-compose.yml logs -f
# Update:    git pull && docker compose -f deploy/docker-compose.yml up -d --build

services:
  # TLS terminator. Only started when PARTY_DOMAIN is set in deploy/.env --
  # on a LAN-only setup the relay is reached directly on 5555 instead.
  caddy:
    image: caddy:2-alpine
    container_name: vault-caddy
    restart: unless-stopped
    ports:
      - "80:80"     # ACME challenge + redirect to HTTPS
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # holds the certificates -- must persist
      - caddy_config:/config
    environment:
      - PARTY_DOMAIN=${PARTY_DOMAIN:?set PARTY_DOMAIN in deploy/.env}
    depends_on:
      - rendezvous

  rendezvous:
    build:
      context: ..
      dockerfile: src/Rendezvous/Dockerfile
    container_name: vault-rendezvous
    restart: unless-stopped
    ports:
      # Host port must stay 5555: the app builds ws://<address>:5555 directly.
      - "5555:5555"
    environment:
      - PORT=5555
      # SQLite for accounts lives on a volume so it survives rebuilds.
      - VAULT_DB=/data/vault.db
    # Account secrets (JWT signing key + SMTP credentials) come from
    # deploy/vault.env, which is gitignored. See deploy/README.md.
    env_file:
      - vault.env
    volumes:
      - vault_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5555/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  # Certificates live here. Losing this volume means re-issuing, and Let's
  # Encrypt rate-limits that, so do not prune it casually.
  caddy_data:
  caddy_config:
  # Accounts + synced library. Do not prune -- this is user data.
  vault_data:
